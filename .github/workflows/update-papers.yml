name: Update Memory Papers

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-papers.yml"
      - "scripts/**"
      - "config/**"
      - "data/manual_entries.json"
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update tracker
        run: python scripts/update_papers.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/papers.json content/papers
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update memory papers"
          git push
